name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # 1. Validação do nome da branch
  # ─────────────────────────────────────────────
  branchlint:
    name: 🌿 Branch Lint
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Branch: $BRANCH"

          # Padrão permitido:
          # main | develop | US-123 | US-123-short-description
          if echo "$BRANCH" | grep -qE '^(main|develop)$|^US-[0-9]+(-[a-z0-9._-]+)?$'; then
            echo "✅ Branch name is valid."
          else
            echo "❌ Invalid branch name: '$BRANCH'"
            echo ""
            echo "Branch names must follow the pattern:"
            echo "  main"
            echo "  develop"
            echo "  US-123"
            echo "  US-123-short-description"
            echo ""
            echo "Rules: prefix must be 'US-' followed by the issue number,"
            echo "optionally followed by a lowercase hyphenated description."
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 2. Validação do padrão de commits
  # ─────────────────────────────────────────────
  commitlint:
    name: 📝 Commit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install commitlint
        run: npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha || 'HEAD~1' }} --to HEAD --verbose

  # ─────────────────────────────────────────────
  # 3. Lint, Build e Testes
  # ─────────────────────────────────────────────
  quality:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    needs: [branchlint, commitlint]

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo
          MONGO_INITDB_ROOT_PASSWORD: mongo
          MONGO_INITDB_DATABASE: app_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── ESLint ──
      - name: Run ESLint
        run: npm run lint

      # ── Prisma ──
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: mongodb://mongo:mongo@localhost:27017/app_test?authSource=admin

      # ── Testes unitários ──
      - name: Run unit tests
        run: npm run test -- --coverage --passWithNoTests
        env:
          DATABASE_URL: mongodb://mongo:mongo@localhost:27017/app_test?authSource=admin
          NODE_ENV: test

      # ── Testes e2e ──
      - name: Run e2e tests
        run: npm run test:e2e -- --passWithNoTests
        env:
          DATABASE_URL: mongodb://mongo:mongo@localhost:27017/app_test?authSource=admin
          NODE_ENV: test

      # ── Build de produção ──
      - name: Build
        run: npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 4. Build e push da imagem Docker
  # ─────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production